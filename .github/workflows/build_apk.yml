name: "Dardashati Advanced Audit System"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # --- المرحلة الأهم: فحص محتوى الصفحات واقتراح التعديلات ---
      - name: "🔍 Deep Code Audit (فحص جودة الصفحات واقتراحات الإصلاح)"
        run: |
          echo "===================================================="
          echo "📝 تقرير الفحص البرمجي واقتراحات التعديل لمشروع دردشاتي"
          echo "===================================================="
          
          audit_page() {
            local file=$1
            local name=$2
            if [ ! -f "$file" ]; then
              echo "❌ [ $name ]: الملف مفقود تماماً! لن يعمل التطبيق."
              return
            fi
            
            echo "✅ [ $name ]: موجود. يتم الآن فحص المنطق الداخلي..."
            
            # فحص نقص الباراميترات (السبب في مشكلة الدوران)
            if grep -q "required" "$file" && ! grep -q "currentUser" "lib/main.dart"; then
              echo "⚠️  اقتراح تعديلي: صفحة $name تطلب بيانات مستخدم، تأكد من تمرير 'currentUser' في ملف main.dart."
            fi

            # فحص استدعاء Supabase
            if ! grep -q "Supabase" "$file"; then
              echo "💡 تنبيه: هذه الصفحة لا تحتوي على ربط بـ Supabase، قد تكون واجهة فقط (Static UI)."
            fi

            # فحص الأخطاء التي ظهرت في صورك السابقة
            if grep -q "isLogin" "$file" && ! grep -q "isLogin: true" "lib/main.dart"; then
               echo "❗ خطأ فادح: صفحة $name تطلب 'isLogin' وهو غير ممرر من ملف التشغيل."
            fi
          }

          audit_page "lib/main.dart" "ملف التشغيل الأساسي"
          audit_page "lib/login_screen.dart" "شاشة الدخول الزجاجية"
          audit_page "lib/home_screen.dart" "الشاشة الرئيسية"
          audit_page "lib/profile_screen.dart" "شاشة الملف الشخصي"
          audit_page "lib/room_chat_screen.dart" "شاشة غرف الدردشة"
          echo "===================================================="

      - name: System Initialization & Fixes
        run: |
          # إصلاح الاستدعاءات تلقائياً لضمان عدم تعليق البناء
          sed -i 's/name: .*/name: dardashati_r/' pubspec.yaml
          find . -name "*.dart" -exec sed -i 's/package:dardashati\//package:dardashati_r\//g' {} +
          flutter pub get

      - name: "🛠️ Execution Audit (فحص الأخطاء القاتلة)"
        run: |
          # هذا الفحص سيعرض لك الأخطاء التي تجعل التطبيق "يدور للأبد"
          flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build Production APK
        run: |
          # بناء التطبيق مع توجيه صريح
          flutter build apk --release --target lib/main.dart --no-tree-shake-icons

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-Build
          path: build/app/outputs/flutter-apk/app-release.apk

name: "Dardashati High-Level Build System"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # الخطوة 1: تشغيل السكريبت (هو اللي راح يدخل للملف ويحذفه ويعدله)
      - name: "🧠 Intelligent Logic Overwrite"
        run: |
          cat << 'EOF' > auto_builder.py
          import os
          import re

          def build_perfect_main():
              screens = {'LoginScreen': 'lib/login_screen.dart', 'HomeScreen': 'lib/home_screen.dart'}
              needs = {}
              for name, path in screens.items():
                  if os.path.exists(path):
                      with open(path, 'r', encoding='utf-8') as f:
                          content = f.read()
                          needs[name] = re.findall(r'required this\.(\w+)', content)

              # الكود المصلح الذي سيحل مشكلة الـ const وتضارب الموديلات (cite: 1000005960.png)
              main_code = """
          import 'package:flutter/material.dart';
          import 'package:supabase_flutter/supabase_flutter.dart';
          import 'package:dardashati_r/models.dart'; 
          import 'package:dardashati_r/app_theme.dart';
          import 'package:dardashati_r/login_screen.dart';
          import 'package:dardashati_r/home_screen.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            // ضع روابط Supabase الخاصة بك هنا
            await Supabase.initialize(url: 'https://xyz.supabase.co', anonKey: 'your_key');
            runApp(const DardashatiApp());
          }

          class DardashatiApp extends StatefulWidget {
            const DardashatiApp({super.key});
            @override
            State<DardashatiApp> createState() => _DardashatiAppState();
          }

          class _DardashatiAppState extends State<DardashatiApp> {
            late AppThemeData _theme = AppThemeData.dark();
            void _updateTheme(AppThemeData t) => setState(() => _theme = t);

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: _theme.toThemeData(),
                home: StreamBuilder<AuthState>(
                  stream: Supabase.instance.client.auth.onAuthStateChange,
                  builder: (context, snapshot) {
                    final user = snapshot.data?.session?.user;
                    if (user == null) {
                      return LoginScreen(""" + \
                      ", ".join([f"{p}: {'true' if p=='isLogin' else '_theme' if p=='theme' else '_updateTheme'}" for p in needs.get('LoginScreen', [])]) + \
                      """);
                    }
                    // تحويل المستخدم إلى AppUser المطلوب في سجلاتك (cite: 1000005960.png)
                    return HomeScreen(""" + \
                      ", ".join([f"{p}: {'AppUser.fromSupabase(user)' if p=='currentUser' else '_theme' if p=='theme' else '_updateTheme'}" for p in needs.get('HomeScreen', [])]) + \
                      """);
                  },
                ),
              );
            }
          }
          """
              if os.path.exists('lib'):
                  with open('lib/main.dart', 'w', encoding='utf-8') as f:
                      f.write(main_code)
                  print("✅ تم سحق ملف main.dart القديم وحقن المنطق الجديد بنجاح!")
          
          if __name__ == "__main__":
              build_perfect_main()
          EOF
          python3 auto_builder.py

      # الخطوة 2: تنظيف وحل مشاكل Gradle وبناء التطبيق
      - name: "🛠️ Final Polish & Build"
        run: |
          # إصلاح الأسماء في pubspec لضمان توافق الحزم
          sed -i 's/name: .*/name: dardashati_r/' pubspec.yaml
          find . -name "*.dart" -exec sed -i 's/package:dardashati\//package:dardashati_r\//g' {} +
          flutter pub get
          
          # مسح مجلد أندرويد المعطوب (cite: 1000005957.png)
          rm -rf android
          flutter create . --platforms android --project-name dardashati_r
          
          # استخدام أداة جوجل الرسمية لإصلاح أي تحذيرات متبقية
          dart fix --apply
          
          # البناء الصارم لإنتاج APK سليم 100%
          flutter build apk --release --target lib/main.dart --no-tree-shake-icons

      - name: Export Verified APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-Stable
          path: build/app/outputs/flutter-apk/app-release.apk

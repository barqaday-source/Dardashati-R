name: "Dardashati Professional Audit & Build"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # --- مرحلة الفحص والتدقيق (قائمة الجرد) ---
      - name: "🔍 Project Files Audit (فحص اكتمال الملفات)"
        run: |
          echo "===================================================="
          echo "🚀 بدء فحص مكونات مشروع دردشاتي..."
          echo "===================================================="
          
          check_file() {
            if [ -f "$1" ]; then
              echo "✅ الملف [ $1 ] موجود - (مكتمل)"
            else
              echo "❌ الملف [ $1 ] مفقود - (نقص يحتاج إصلاح)"
            fi
          }

          echo "📂 فحص الشاشات الأساسية (UI):"
          check_file "lib/main.dart"
          check_file "lib/login_screen.dart"
          check_file "lib/home_screen.dart"
          check_file "lib/notifications_screen.dart"

          echo -e "\n📂 فحص الخدمات والمنطق (Logic):"
          check_file "lib/services/database_service.dart"
          
          echo -e "\n📂 فحص الإعدادات (Config):"
          check_file "pubspec.yaml"
          echo "===================================================="

      - name: System Initialization
        run: |
          # توحيد الاسم تقنياً لضمان قبول أندرويد للبناء
          sed -i 's/name: .*/name: dardashati_r/' pubspec.yaml
          # إصلاح الاستدعاءات لتطابق الهوية الجديدة تلقائياً
          find . -name "*.dart" -exec sed -i 's/package:dardashati\//package:dardashati_r\//g' {} +
          find . -name "*.dart" -exec sed -i 's/package:Dardashati-R\//package:dardashati_r\//g' {} +
          flutter pub get
          dart fix --apply

      - name: Logic & Analytics Check
        run: |
          # الفحص مع السماح بالتجاوز: لن ينهار البناء بسبب التحذيرات الصفراء
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Clean & Reconstruct Android
        run: |
          # إعادة بناء الهيكل لضمان نظافة ملفات Gradle 2026
          rm -rf android
          flutter create . --platforms android --project-name dardashati_r

      - name: Build Production APK
        run: |
          # البناء النهائي مع توجيه صريح للملف الرئيسي
          flutter build apk --release --target lib/main.dart --no-tree-shake-icons

      - name: Export Final Application
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-Installable
          path: build/app/outputs/flutter-apk/app-release.apk

name: dardashati_r

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Virtual Identity Sync
        run: |
          # 1. تصحيح الاسم في ملف الإعدادات
          sed -i 's/name: .*/name: dardashati_r/' pubspec.yaml
          
          # 2. تصحيح الاستدعاءات في الذاكرة المؤقتة
          find . -name "*.dart" -print0 | xargs -0 sed -i 's/package:dardashati\//package:dardashati_r\//g' || true
          find . -name "*.dart" -print0 | xargs -0 sed -i 's/package:Dardashati-R\//package:dardashati_r\//g' || true
          
          flutter pub get

      - name: Clean & Reconstruct Android
        run: |
          # حذف مجلد أندرويد القديم تماماً لإصلاح مشكلة Gradle
          rm -rf android
          # إعادة إنشاء المجلد بإعدادات حديثة تتوافق مع نسخة Flutter
          flutter create . --platforms android --project-name dardashati_r

      - name: Build Production APK
        run: |
          # الآن سيتم بناء الـ APK باستخدام إعدادات Gradle الجديدة
          flutter build apk --release --no-tree-shake-icons

      - name: Export Final Application
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-Installable
          path: build/app/outputs/flutter-apk/app-release.apk

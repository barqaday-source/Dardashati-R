name: dardashati_r

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: System Initialization
        run: |
          # تصحيح الخطأ المطبعي هنا لضمان استبدال الاسم القديم بالجديد بشكل صحيح
          sed -i 's/name: .*/name: dardashati_r/' pubspec.yaml
          flutter pub get
          # إصلاح التحذيرات البسيطة تلقائياً
          dart fix --apply

      - name: Logic & Analytics Check
        run: |
          # الفحص مع السماح بالتحذيرات الصفراء
          flutter analyze --no-fatal-warnings

      - name: Clean & Reconstruct
        run: |
          flutter clean
          # إعادة إنشاء ملفات أندرويد بالاسم الصحيح
          flutter create . --platforms android --project-name dardashati_r

      - name: Build Production APK
        run: |
          # بناء الـ APK النهائي
          flutter build apk --release --no-tree-shake-icons

      - name: Export Final Application
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-Installable
          path: build/app/outputs/flutter-apk/app-release.apk

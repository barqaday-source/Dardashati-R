name: "Dardashati - Advanced Guard & Builder"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate_and_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: "🛡️ Structural Integrity Check"
        run: |
          sed -i 's/name: .*/name: seachat/' pubspec.yaml
          find lib -name "*.dart" -exec sed -i 's/package:dardashati_r\//package:seachat\//g' {} +
          mkdir -p assets/icons
          flutter pub get
          dart fix --apply
        continue-on-error: true

      - name: "🤖 Android Environment Sync"
        run: |
          rm -rf android
          flutter create --org com.seachat --project-name seachat --platforms android .
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*" apply false/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/' android/settings.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
        continue-on-error: true

      - name: "🏗️ Force Build APK"
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
        continue-on-error: true

      - name: "Rename APK"
        run: |
          mkdir -p release
          APK_PATH=$(find build -name "*.apk" | head -n 1)
          cp "$APK_PATH" release/SeaChat.apk
        if: always()

      - name: "📦 Upload APK to Release"
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: SeaChat Build ${{ github.run_number }}
          body: "APK مبني غصب - جرب الواجهة"
          files: release/SeaChat.apk

name: Dardashati Professional Build System

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # 1. تصحيح الهوية (لضمان قبول التطبيق في أندرويد)
      - name: System Initialization
        run: |
          sed -i 's/name: Dardashati-R/name: dardashati_r/g' pubspec.yaml
          flutter pub get

      # 2. فحص "المنطق والربط" (تأكد من سلامة كود Supabase و Google Auth)
      - name: Logic & Analytics Check
        run: |
          # هذا الأمر يفحص الكود سطراً بسطر ويبحث عن أي تعارض في المنطق
          flutter analyze 

      # 3. إعادة بناء الهيكل (للتخلص من أي "ترقيع" أو ملفات تالفة من الهاتف)
      - name: Clean & Reconstruct
        run: |
          rm -rf android
          flutter create . --platforms android

      # 4. بناء الـ APK النهائي (مع دعم خدمات جوجل وسوبابيز)
      - name: Build Production APK
        run: |
          # --no-tree-shake-icons: تضمن ظهور أيقونات جوجل وسوبابيز بدون اختفاء
          # --release: لضمان أقصى أداء وسرعة للتطبيق
          flutter build apk --release --no-tree-shake-icons

      # 5. استخراج الملف الجاهز للتثبيت
      - name: Export Final Application
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-Installable
          path: build/app/outputs/flutter-apk/app-release.apk

name: Build Dardashati App Professional

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # استخدام جافا 17 (النسخة الأكثر استقراراً للفلاتر حالياً)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # الخطوة الحاسمة: استخدام إصدار 7.6.3 لحل مشكلة Groovy QName
      - name: Configure Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 7.6.3 --distribution-type all
          chmod +x gradlew

      - name: Build Release APK
        run: |
          # تنظيف وبناء نظيف لضمان عدم تداخل الملفات القديمة
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk

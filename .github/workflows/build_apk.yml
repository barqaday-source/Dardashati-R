name: Build Dardashati App V2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد الجافا (متوافق مع Gradle 8.0)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. إعداد فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      # 4. إصلاح ملفات Gradle المفقودة (حل مشكلة الرفع من الهاتف)
      - name: Restore Gradle Wrapper
        run: |
          # هذا الأمر سيقوم بتوليد ملف gradlew وملف gradle-wrapper.jar تلقائياً داخل نظام GitHub
          # حتى لو كانت مفقودة في مستودعك، سيتم إنشاؤها هنا لضمان نجاح البناء.
          flutter pub get
          cd android
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          cd ..

      # 5. جلب المكتبات (Dependencies)
      - name: Get Dependencies
        run: flutter pub get

      # 6. بناء الـ APK (مع معالجة الأيقونات والشاشات)
      - name: Build APK Release
        run: |
          # خيار --no-tree-shake-icons مهم جداً لتجنب فشل البناء بسبب مكتبات الأيقونات الخارجية
          flutter build apk --release --no-tree-shake-icons

      # 7. رفع ملف الـ APK الناتج كملف جاهز للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dardashati-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

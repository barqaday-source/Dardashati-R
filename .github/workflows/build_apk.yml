name: "Dardashati Auto-Fix & Build System"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # ==========================================
      # 🕵️‍♂️ المرحلة 1: المحلل الذكي وبناء العقل المدبر (main.dart)
      # ==========================================
      - name: "🧠 Intelligent Logic Constructor"
        run: |
          cat << 'EOF' > auto_builder.py
          import os
          import re

          def build_perfect_main():
              # فحص الاحتياجات الحقيقية للشاشات لتجنب الأخطاء الـ 16
              screens = {'LoginScreen': 'lib/login_screen.dart', 'HomeScreen': 'lib/home_screen.dart'}
              needs = {}
              for name, path in screens.items():
                  if os.path.exists(path):
                      with open(path, 'r') as f:
                          content = f.read()
                          # استخراج الباراميترات المطلوبة (مثل theme, currentUser)
                          needs[name] = re.findall(r'required this\.(\w+)', content)

              # بناء كود main.dart يدعم AppUser و AppThemeData (حل تضارب الأنواع)
              main_code = """
          import 'package:flutter/material.dart';
          import 'package:supabase_flutter/supabase_flutter.dart';
          import 'package:dardashati_r/models.dart'; 
          import 'package:dardashati_r/app_theme.dart';
          import 'package:dardashati_r/login_screen.dart';
          import 'package:dardashati_r/home_screen.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await Supabase.initialize(url: 'YOUR_URL', anonKey: 'YOUR_KEY');
            runApp(const DardashatiApp());
          }

          class DardashatiApp extends StatefulWidget {
            const DardashatiApp({super.key});
            @override
            State<DardashatiApp> createState() => _DardashatiAppState();
          }

          class _DardashatiAppState extends State<DardashatiApp> {
            late AppThemeData _theme = AppThemeData.dark();
            void _updateTheme(AppThemeData t) => setState(() => _theme = t);

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: _theme.toThemeData(),
                home: StreamBuilder<AuthState>(
                  stream: Supabase.instance.client.auth.onAuthStateChange,
                  builder: (context, snapshot) {
                    final user = snapshot.data?.session?.user;
                    if (user == null) {
                      return LoginScreen(""" + \
                      ", ".join([f"{p}: {'true' if p=='isLogin' else '_theme' if p=='theme' else '_updateTheme'}" for p in needs.get('LoginScreen', [])]) + \
                      """);
                    }
                    return HomeScreen(""" + \
                      ", ".join([f"{p}: {'AppUser.fromSupabase(user)' if p=='currentUser' else '_theme' if p=='theme' else '_updateTheme'}" for p in needs.get('HomeScreen', [])]) + \
                      """);
                  },
                ),
              );
            }
          }
          """
              if os.path.exists('lib'):
                  with open('lib/main.dart', 'w') as f:
                      f.write(main_code)
                  print("✅ تم بناء وحقن ملف main.dart المتكامل بنجاح!")
          
          if __name__ == "__main__":
              build_perfect_main()
          EOF
          python3 auto_builder.py

      # ==========================================
      # 🧹 المرحلة 2: التنظيف العميق وحل مشاكل Gradle 
      # ==========================================
      - name: "🛠️ Final Polish & Build"
        run: |
          # 1. تنظيف الهوية وتحديث الحزم
          sed -i 's/name: .*/name: dardashati_r/' pubspec.yaml
          find . -name "*.dart" -exec sed -i 's/package:dardashati\//package:dardashati_r\//g' {} +
          flutter pub get
          
          # 2. تدمير وإعادة بناء مجلد أندرويد (الحل الجذري لخطأ Gradle)
          rm -rf android
          flutter create . --platforms android --project-name dardashati_r
          
          # 3. استخدام أداة جوجل لإصلاح التحذيرات البسيطة تلقائياً
          dart fix --apply
          
          # 4. البناء الصارم والنهائي
          flutter build apk --release --target lib/main.dart --no-tree-shake-icons

      # ==========================================
      # 📦 المرحلة 3: تصدير التطبيق النهائي السليم
      # ==========================================
      - name: Export Final Application
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Verified-APK
          path: build/app/outputs/flutter-apk/app-release.apk

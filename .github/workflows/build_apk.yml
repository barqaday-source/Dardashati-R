name: Build Dardashati App Professional

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      # إصلاح اسم الحزمة وهيكل الأندرويد في خطوة واحدة
      - name: Repair and Reconstruct Android
        run: |
          # تغيير اسم المشروع داخلياً ليكون مقبولاً لدى فلاتر (حروف صغيرة وبدون شرطة)
          sed -i 's/name: Dardashati-R/name: dardashati_r/g' pubspec.yaml
          flutter pub get
          flutter create . --platforms android
          
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 7.6.3 --distribution-type all
          chmod +x gradlew

      - name: Build Release APK
        run: |
          # البناء باستخدام الاسم الجديد المصلح
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-Release
          path: build/app/outputs/flutter-apk/app-release.apk

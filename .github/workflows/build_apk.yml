name: Build Dardashati App Professional

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # الخطوة الحاسمة: بناء APK مباشرة (فلاتر سيتكفل بجلب النسخة المتوافقة تلقائياً)
      - name: Build Release APK
        run: |
          flutter clean
          flutter pub get
          # استخدام هذا الأمر يجبر فلاتر على استخدام محركه الخاص وتجاوز أخطاء Gradle الخارجية
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk

name: dardashati_r

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Project Standardization
        run: |
          # توحيد الهوية التقنية للمشروع
          sed -i 's/name: .*/name: dardashati_r/' pubspec.yaml
          find . -name "*.dart" -exec sed -i 's/package:dardashati\//package:dardashati_r\//g' {} +
          find . -name "*.dart" -exec sed -i 's/package:Dardashati-R\//package:dardashati_r\//g' {} +
          flutter pub get

      - name: Clean & Reconstruct Android
        run: |
          # بناء هيكل أندرويد بمعايير 2026 المتوافقة مع Flutter 3.19
          rm -rf android
          flutter create . --platforms android --project-name dardashati_r

      - name: Build Production APK
        run: |
          # البناء النهائي بأعلى جودة مع تجاهل التحذيرات غير المؤثرة
          flutter build apk --release --target lib/main.dart --no-tree-shake-icons

      - name: Export Final Application
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-Installable
          path: build/app/outputs/flutter-apk/app-release.apk

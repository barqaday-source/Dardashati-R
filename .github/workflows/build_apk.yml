name: Build Dardashati App Final

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # الخطوة الحاسمة لتجنب خطأ Groovy و QName
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          # حذف أي آثار لنسخ قديمة قد تسبب تعارض
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper
          # إنشاء غلاف جديد تماماً متوافق مع Flutter 3.19
          gradle wrapper --gradle-version 7.6.3 --distribution-type all
          chmod +x gradlew

      - name: Build Release APK
        run: |
          # تنظيف المشروع قبل البناء لضمان عدم وجود ملفات تالفة
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk

name: Build Dardashati Professional

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # 1. تصحيح اسم المشروع (قاعدة أساسية في فلاتر)
      - name: Fix Package Name
        run: |
          sed -i 's/name: Dardashati-R/name: dardashati_r/g' pubspec.yaml
          flutter pub get

      # 2. إنشاء مجلد أندرويد "أصلي" (بدلاً من المجلد التالف المرفوع)
      - name: Recreate Android Project
        run: |
          # حذف المجلد القديم لضمان عدم وجود "ترقيع"
          rm -rf android
          # إنشاء مجلد أندرويد جديد بمعايير جوجل الصحيحة
          flutter create . --platforms android

      # 3. بناء التطبيق باستخدام محرك فلاتر الرسمي
      - name: Build APK
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final
          path: build/app/outputs/flutter-apk/app-release.apk

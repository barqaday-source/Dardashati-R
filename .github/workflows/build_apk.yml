name: dardashati_r

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      # هذه الخطوة تعالج التضارب في "بيئة البناء" فقط دون التأثير على ملفاتك الأصلية
      - name: Virtual Identity Sync
        run: |
          # 1. إجبار ملف الإعدادات على قبول الاسم الصغير والمطلوب تقنياً
          sed -i 's/name: .*/name: dardashati_r/' pubspec.yaml
          
          # 2. حل تضارب الـ package: يغير الاستدعاءات داخل الذاكرة المؤقتة لتطابق الاسم الجديد
          find . -name "*.dart" -print0 | xargs -0 sed -i 's/package:dardashati\//package:dardashati_r\//g' || true
          find . -name "*.dart" -print0 | xargs -0 sed -i 's/package:Dardashati-R\//package:dardashati_r\//g' || true
          
          flutter pub get
          dart fix --apply

      - name: Logic & Analytics Check
        run: |
          # فحص ذكي يتجاهل التحذيرات لضمان استمرار البناء
          flutter analyze --no-fatal-warnings

      - name: Clean & Reconstruct
        run: |
          flutter clean
          # إعادة بناء ملفات أندرويد بالهوية الجديدة في بيئة البناء
          flutter create . --platforms android --project-name dardashati_r

      - name: Build Production APK
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: Export Final Application
        uses: actions/upload-artifact@v4
        with:
          name: Dardashati-Final-Installable
          path: build/app/outputs/flutter-apk/app-release.apk
